<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homeowner Request Email</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 600px; background: #f9f9f9; padding: 20px; border-radius: 5px; }
        h2 { color: #333; }
        p { line-height: 1.5; }
        footer { margin-top: 20px; font-size: 0.8em; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Homeowner Request Received</h2>
        <p>Dear Homeowner,</p>
        <p>Thank you for your request. Our team will review it and get back to you shortly.</p>
        <footer>
            <p>Best regards,</p>
            <p>Your Company Name</p>
        </footer>
    </div>
</body>
</html>
